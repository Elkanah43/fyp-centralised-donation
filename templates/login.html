{% load static %}<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Sign in | LifeBridge</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2314221d'/%3E%3Cpath d='M32 12v40M12 32h40' stroke='%23ffffff' stroke-width='8' stroke-linecap='round'/%3E%3Cpath d='M32 18s10 10 10 18a10 10 0 0 1-20 0c0-8 10-18 10-18Z' fill='%23b8323a'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <style>
      .login-wrap {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .login-card {
        width: min(420px, 100%);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 32px 28px;
      }
      .login-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }
      .login-brand .brand-mark {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: #14221d;
        color: #fff;
        font-size: 24px;
        font-weight: 900;
      }
      .login-card h1 {
        margin: 0;
        font-size: 1.4rem;
      }
      .login-card .login-sub {
        margin: 4px 0 22px;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .login-card label {
        display: block;
        font-weight: 700;
        font-size: 0.9rem;
        margin-bottom: 14px;
      }
      .login-card input {
        display: block;
        width: 100%;
        margin-top: 6px;
        padding: 11px 12px;
        font: inherit;
        color: var(--ink);
        background: var(--surface-soft);
        border: 1px solid var(--line);
        border-radius: var(--radius);
      }
      .login-card input:focus {
        outline: 2px solid var(--teal);
        outline-offset: 1px;
      }
      .login-error {
        background: #fbeaea;
        border: 1px solid var(--red);
        color: var(--red-strong);
        border-radius: var(--radius);
        padding: 10px 12px;
        font-size: 0.9rem;
        margin-bottom: 16px;
      }
      .login-submit {
        width: 100%;
        padding: 12px;
        font: inherit;
        font-weight: 800;
        color: #fff;
        background: var(--teal);
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        transition: background 160ms ease;
      }
      .login-submit:hover {
        background: var(--teal-dark);
      }
      .login-note {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 0.85rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="login-wrap">
      <div class="login-card">
        <div class="login-brand">
          <span class="brand-mark" aria-hidden="true">+</span>
          <h1>LifeBridge</h1>
        </div>
        <p class="login-sub">Sign in to the donation coordination console.</p>

        {% if form.errors %}
          <div class="login-error" role="alert">
            Your username and password didn't match. Please try again.
          </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
          {% csrf_token %}
          <label>
            Username
            <input type="text" name="username" autocomplete="username" autofocus required />
          </label>
          <label>
            Password
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <input type="hidden" name="next" value="{{ next }}" />
          <button class="login-submit" type="submit">Sign in</button>
        </form>

        <p class="login-note">Accounts are created by an administrator.</p>
      </div>
    </main>
  </body>
</html>
